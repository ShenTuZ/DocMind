<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocMind - 登录</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #f5f7fa;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 48px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 100%;
            max-width: 480px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0 0 8px 0;
        }
        
        .login-header p {
            color: #666;
            font-size: 16px;
            margin: 0;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .form-input {
            padding: 14px 16px;
            border: 2px solid rgba(3, 155, 229, 0.2);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }
        
        .form-input:focus {
            outline: none;
            border-color: rgba(3, 155, 229, 0.5);
            box-shadow: 0 0 0 3px rgba(3, 155, 229, 0.1);
        }
        
        .form-select {
            padding: 14px 16px;
            border: 2px solid rgba(3, 155, 229, 0.2);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            cursor: pointer;
        }
        
        .form-select:focus {
            outline: none;
            border-color: rgba(3, 155, 229, 0.5);
            box-shadow: 0 0 0 3px rgba(3, 155, 229, 0.1);
        }
        
        .login-button {
            background: #039BE5;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(3, 155, 229, 0.4);
        }
        
        .login-button:active {
            transform: translateY(0);
        }
        
        .error-message {
            color: #ff4757;
            font-size: 14px;
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            background: rgba(255, 71, 87, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 71, 87, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>DocMind</h1>
            <p>智能文档助手 - 登录</p>
        </div>
        <form class="login-form" id="login-form">
            <div class="form-group">
                <label for="username">账号</label>
                <select class="form-select" id="username" required>
                    <option value="">请选择账号</option>
                    <option value="Administrator">Administrator</option>
                    <option value="Person">Person</option>
                    <option value="Undefined">Undefined</option>
                </select>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-button">登录</button>
        </form>
        <div id="error-message" class="error-message" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            
            if (!username) {
                errorMessage.textContent = '请选择账号';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (password !== '111') {
                errorMessage.textContent = '密码错误，请输入正确的密码';
                errorMessage.style.display = 'block';
                return;
            }
            
            // 登录成功，通知主进程
            window.electronAPI.loginSuccess({ username });
        });
    </script>
</body>
</html>
