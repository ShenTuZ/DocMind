<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP AI Agent</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>MCP AI Agent</h1>
            </div>
            <div class="sidebar-nav">
                <div class="nav-card active" onclick="switchTab('chat')" id="nav-chat">
                    <div class="nav-card-icon">💬</div>
                    <div class="nav-card-content">
                        <div class="nav-card-title">新对话</div>
                        <div class="nav-card-desc">与 AI 智能助手对话</div>
                    </div>
                </div>
                <div class="nav-card" onclick="switchTab('knowledge')" id="nav-knowledge">
                    <div class="nav-card-icon">📚</div>
                    <div class="nav-card-content">
                        <div class="nav-card-title">知识库</div>
                        <div class="nav-card-desc">管理您的知识库</div>
                    </div>
                </div>
                <div class="nav-card" onclick="openConfig()" id="nav-config">
                    <div class="nav-card-icon">⚙️</div>
                    <div class="nav-card-content">
                        <div class="nav-card-title">设置</div>
                        <div class="nav-card-desc">配置系统参数</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="chat-container" id="chat-container">
                <div class="chat-card">
                    <div class="chat-messages" id="chat-messages">
                        <div class="empty-state">
                            <p style="font-size: 24px; margin-bottom: 12px;">👋 欢迎使用 MCP AI Agent</p>
                            <p style="margin-bottom: 8px;">我可以帮您操作文件系统，例如：</p>
                            <p style="color: #039BE5; margin-bottom: 4px;">• "列出 Desktop 目录的内容"</p>
                            <p style="color: #039BE5; margin-bottom: 4px;">• "读取 Desktop 下的 test.txt 文件"</p>
                            <p style="color: #039BE5; margin-bottom: 4px;">• "在 Desktop 创建一个新文件"</p>
                            <p style="color: #039BE5; margin-bottom: 4px;">• "搜索 Desktop 下所有的 .js 文件"</p>
                            <p style="margin-top: 12px; font-size: 12px; color: #999;">开始输入您的消息吧！</p>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <div class="input-wrapper">
                            <input type="text" class="input-field" id="message-input" placeholder="输入您的问题，例如：列出 Desktop 目录的内容..." onkeypress="handleKeyPress(event)">
                            <button class="voice-button" onclick="toggleVoiceRecording()" id="voice-button" title="语音输入">
                                <span class="voice-icon">🎤</span>
                                <span class="voice-text">语音</span>
                            </button>
                            <button class="send-button" onclick="sendMessage()" id="send-button">
                                ▶
                            </button>
                            <button class="clear-button" onclick="clearHistory()" title="清空历史记录">
                                ✕
                            </button>
                        </div>
                        <div class="voice-status" id="voice-status" style="display: none;">
                            <div class="voice-indicator"></div>
                            <span class="voice-status-text">正在录音...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="knowledge-container hidden" id="knowledge-container">
                <div class="add-knowledge-card">
                    <h3>添加知识</h3>
                    <div class="form-group">
                        <label>标题</label>
                        <input type="text" class="form-input" id="knowledge-title" placeholder="输入标题">
                    </div>
                    <div class="form-group">
                        <label>内容</label>
                        <textarea class="form-textarea" id="knowledge-content" placeholder="输入内容"></textarea>
                    </div>
                    <button class="submit-button" onclick="addKnowledge()">添加到知识库</button>
                </div>
                <div class="knowledge-grid" id="knowledge-list">
                </div>
            </div>
        </div>
    </div>

    <div class="config-modal hidden" id="config-modal">
        <div class="config-content">
            <button class="close-button" onclick="closeConfig()">×</button>
            <h2>系统设置</h2>
            <div class="form-group">
                <label>API 模型名称</label>
                <input type="text" class="form-input" id="model-name" value="Qwen/Qwen3-VL-32B-Instruct">
            </div>
            <div class="form-group">
                <label>Desktop 路径</label>
                <input type="text" class="form-input" id="desktop-path" placeholder="Desktop 路径">
            </div>
            <div class="form-group">
                <label>Downloads 路径</label>
                <input type="text" class="form-input" id="downloads-path" placeholder="Downloads 路径">
            </div>
            <button class="submit-button" onclick="saveConfig()">保存设置</button>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
