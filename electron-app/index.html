<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocMind - 智能文档助手</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>DocMind</h1>
            </div>
            <div class="sidebar-nav">
                <div class="nav-card active" onclick="switchTab('chat')" id="nav-chat">
                        <div class="nav-card-icon">💬</div>
                        <div class="nav-card-content">
                            <div class="nav-card-title">桌面对话</div>
                            <div class="nav-card-desc">与 AI 智能助手对话</div>
                        </div>
                    </div>
                <div class="nav-card" onclick="switchTab('knowledge')" id="nav-knowledge">
                    <div class="nav-card-icon">📚</div>
                    <div class="nav-card-content">
                        <div class="nav-card-title">知识库</div>
                        <div class="nav-card-desc">管理您的知识库</div>
                    </div>
                </div>
                <div class="nav-card" onclick="switchTab('pageindex')" id="nav-pageindex">
                    <div class="nav-card-icon">🌲</div>
                    <div class="nav-card-content">
                        <div class="nav-card-title">PageIndex</div>
                        <div class="nav-card-desc">无向量RAG文档处理</div>
                    </div>
                </div>
                <div class="nav-card" onclick="openConfig()" id="nav-config">
                    <div class="nav-card-icon">⚙️</div>
                    <div class="nav-card-content">
                        <div class="nav-card-title">设置</div>
                        <div class="nav-card-desc">配置系统参数</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="chat-container" id="chat-container">
                <div class="chat-card">
                    <div class="chat-hint">
                        <span class="hint-icon">💡</span>
                        <span class="hint-text">处理桌面文件时，请尽量精确描述文件类型（例如：新闻.docx）</span>
                    </div>
                    <div class="chat-messages" id="chat-messages">
                    </div>
                    <div class="chat-input-area">
                        <div class="attachment-preview" id="attachment-preview" style="display: none;">
                            <div class="attachment-item" id="attachment-item">
                                <span class="attachment-name" id="attachment-name"></span>
                                <button class="remove-attachment" onclick="removeAttachment()">✕</button>
                            </div>
                        </div>
                        <div class="input-wrapper">
                            <input type="text" class="input-field" id="message-input" placeholder="输入您的问题，例如：查看 新闻.docx 文件的内容..." onkeypress="handleKeyPress(event)">
                            <div class="upload-buttons">
                                <button class="upload-button" onclick="selectImage()" id="image-button" title="上传图片">
                                    <span class="upload-text">图片</span>
                                </button>
                                <button class="upload-button" onclick="selectFile()" id="file-button" title="上传文件">
                                    <span class="upload-text">文件</span>
                                </button>
                            </div>
                            <button class="voice-button" onclick="toggleVoiceRecording()" id="voice-button" title="语音">
                                <span class="voice-text">语音</span>
                            </button>
                            <button class="send-button" onclick="sendMessage()" id="send-button">
                                ▶
                            </button>
                            <button class="clear-button" onclick="clearHistory()" title="清空历史记录">
                                ✕
                            </button>
                        </div>

                    </div>
                </div>
            </div>

            <div class="knowledge-container hidden" id="knowledge-container">
                <div class="knowledge-header">
                    <h2>知识库管理</h2>
                    <p>使用RAG技术处理文档，构建智能知识库</p>
                </div>
                
                <div class="knowledge-upload-section">
                    <h3>上传文档</h3>
                    <div class="upload-area">
                        <div class="upload-buttons-group">
                            <button class="primary-button" onclick="selectFilesForRAG()">选择文件</button>
                            <button class="secondary-button" onclick="selectFolderForRAG()">选择文件夹</button>
                        </div>
                        <p class="upload-info">支持格式：.txt, .md, .pdf, .docx</p>
                    </div>
                </div>
                
                <div class="rag-progress-section" id="rag-progress-section">
                    <div class="progress-text" id="rag-progress-text">准备中...</div>
                </div>
                
                <!-- 知识库聊天界面 -->
                <div class="knowledge-chat-container">
                    <div class="chat-header">
                        <h3>知识库对话</h3>
                        <select class="chat-file-select" id="knowledge-file-select">
                            <option value="">所有文件</option>
                        </select>
                    </div>
                    
                    <div class="chat-messages" id="knowledge-chat-messages">
                        <!-- 聊天消息将在这里动态显示 -->
                    </div>
                    
                    <div class="chat-input-area">
                        <input type="text" class="chat-input" id="knowledge-chat-input" placeholder="输入问题..." onkeypress="handleChatKeyPress(event)">
                        <button class="chat-send-button" onclick="sendKnowledgeMessage()">发送</button>
                    </div>
                </div>
                
                <div class="knowledge-list-section">
                    <h3>文档列表</h3>
                    <div class="knowledge-grid" id="knowledge-list">
                    </div>
                </div>
            </div>

            <div class="pageindex-container hidden" id="pageindex-container">
                <div class="pageindex-header">
                    <h2>PageIndex 无向量RAG</h2>
                    <p>基于推理的树搜索文档处理系统</p>
                </div>
                
                <div class="pageindex-upload-section">
                    <h3>上传文档</h3>
                    <div class="upload-area">
                        <div class="upload-buttons-group">
                            <button class="primary-button" onclick="selectFilesForPageIndex()">选择文件</button>
                            <button class="secondary-button" onclick="selectFolderForPageIndex()">选择文件夹</button>
                        </div>
                        <p class="upload-info">支持格式：.pdf, .md</p>
                    </div>
                </div>
                
                <div class="pageindex-progress-section" id="pageindex-progress-section">
                    <div class="progress-text" id="pageindex-progress-text">准备中...</div>
                </div>
                
                <!-- PageIndex聊天界面 -->
                <div class="pageindex-chat-container">
                    <div class="chat-header">
                        <h3>文档对话</h3>
                        <select class="chat-file-select" id="pageindex-file-select">
                            <option value="">选择文档</option>
                        </select>
                    </div>
                    
                    <div class="chat-messages" id="pageindex-chat-messages">
                    </div>
                    
                    <div class="chat-input-area">
                        <input type="text" class="chat-input" id="pageindex-chat-input" placeholder="输入问题..." onkeypress="handlePageIndexChatKeyPress(event)">
                        <button class="chat-send-button" onclick="sendPageIndexMessage()">发送</button>
                    </div>
                </div>
                
                <div class="pageindex-list-section">
                    <h3>已处理文档</h3>
                    <div class="knowledge-grid" id="pageindex-list">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="config-modal hidden" id="config-modal">
        <div class="config-content">
            <button class="close-button" onclick="closeConfig()">×</button>
            <h2>系统设置</h2>
            <div class="form-group">
                <label>模型类型</label>
                <select class="form-input" id="model-type">
                    <option value="api">API 模型</option>
                    <option value="ollama">本地 Ollama 模型</option>
                </select>
            </div>
            <div class="form-group" id="api-model-section">
                <label>API 模型名称</label>
                <input type="text" class="form-input" id="model-name" value="Qwen/Qwen3-VL-235B-A22B-Instruct">
            </div>
            <div class="form-group" id="ollama-model-section" style="display: none;">
                <label>Ollama 模型名称</label>
                <input type="text" class="form-input" id="ollama-model-name" value="qwen3.5:4b">
            </div>
            <div class="form-group">
                <label>Desktop 路径</label>
                <input type="text" class="form-input" id="desktop-path" placeholder="Desktop 路径">
            </div>
            <div class="form-group">
                <label>Downloads 路径</label>
                <input type="text" class="form-input" id="downloads-path" placeholder="Downloads 路径">
            </div>
            <button class="submit-button" onclick="saveConfig()">保存设置</button>
        </div>
    </div>

    <input type="file" id="image-input" accept="image/*" style="display: none;" onchange="handleImageSelect(event)">
    <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(event)">
    <input type="file" id="rag-file-input" multiple style="display: none;" onchange="handleRAGFileSelect(event)">
    <input type="file" id="rag-folder-input" webkitdirectory directory style="display: none;" onchange="handleRAGFolderSelect(event)">
    <input type="file" id="pageindex-file-input" multiple style="display: none;" onchange="handlePageIndexFileSelect(event)">
    <input type="file" id="pageindex-folder-input" webkitdirectory directory style="display: none;" onchange="handlePageIndexFolderSelect(event)">

    <script src="renderer.js"></script>
</body>
</html>
